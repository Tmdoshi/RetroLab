<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sell an Item // Retro Lab</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <h1>RETRO LAB</h1>
    <p>// list your hardware //</p>
  </header>

  <nav>
    <a href="{{ url_for('index') }}">&larr; BACK TO ALL LISTINGS</a>
  </nav>

  <div class="container">
    <form method="POST" style="max-width:500px;margin:0 auto;">
      <label for="title">Item Title</label>
      <input type="text" id="title" name="title" required>

      <label for="category">Category</label>
      <select id="category" name="category" required>
        <option value="Console">Console</option>
        <option value="Handheld">Handheld</option>
        <option value="Computer">Computer</option>
        <option value="Accessory">Accessory</option>
        <option value="Game">Game</option>
      </select>

      <label for="condition">Condition</label>
      <select id="condition" name="condition" required>
        <option value="Excellent">Excellent</option>
        <option value="Very Good">Very Good</option>
        <option value="Good">Good</option>
        <option value="Fair">Fair</option>
        <option value="For Parts">For Parts</option>
      </select>

      <label for="price">Price (USD)</label>
      <input type="number" id="price" name="price" step="0.01" min="0" required>

      <label for="description">Description</label>
      <textarea id="description" name="description" rows="4"></textarea>

      <label for="seller_name">Your Seller Name</label>
      <input type="text" id="seller_name" name="seller_name" required>

      <button type="submit" class="btn" style="margin-top:20px;">SUBMIT LISTING</button>
    </form>
  </div>

  <footer>Retro Lab &mdash; ICT171 Assignment 3</footer>
</body>
</html>
